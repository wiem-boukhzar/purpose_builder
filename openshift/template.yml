apiVersion: template.openshift.io/v1
kind: Template
labels:
 template: component-template
 app: "${PROJECT}-${COMPONENT}"
parameters:
 - description: The name of the application project.
   displayName: Project
   name: PROJECT
   value: dfclntx
   required: true
 - description: The name of the component (service + deployment).
   displayName: Component
   name: COMPONENT
   value: purpose-builder-agent
   required: true
 - name: TAGVERSION
   displayName: Tag version
   description: The version/tag to be used.
   value: latest
   required: true
 - name: MEMORY_LIMIT
   displayName: Memory Limit
   description: Maximum amount of memory available for the container.
   value: 2048Mi
   required: true
 - name: MEMORY_REQUEST
   displayName: Memory Request
   description: Minimum amount of memory requested for the container.
   value: 1024Mi
   required: true
 - name: CPU_LIMIT
   displayName: CPU Limit
   description: Maximum amount of CPU available for the container.
   value: 1000m
   required: true
 - name: CPU_REQUEST
   displayName: CPU Request
   description: Minimum amount of CPU requested for the container.
   value: 100m
   required: true
 - name: SERVICE_ACCOUNT
   displayName: Service Account
   description: Service account used by the deployment pod (must have the right pull permissions/secrets).
   value: default
   required: true
 - name: TAILOR_NAMESPACE
   required: true
objects:
 - apiVersion: v1
   kind: Service
   metadata:
     name: ${COMPONENT}
   spec:
     ports:
       - name: http
         port: 8080
         protocol: TCP
         targetPort: 8080
     selector:
       app: "${PROJECT}-${COMPONENT}"
       deploymentconfig: ${COMPONENT}
     sessionAffinity: None
     type: ClusterIP


 - apiVersion: v1
   kind: DeploymentConfig
   metadata:
     name: ${COMPONENT}
   spec:
     replicas: 1
     revisionHistoryLimit: 10
     selector:
       app: "${PROJECT}-${COMPONENT}"
       deploymentconfig: "${COMPONENT}"
     strategy:
       type: Rolling
       rollingParams:
         intervalSeconds: 1
         maxSurge: 25%
         maxUnavailable: 25%
         timeoutSeconds: 600
         updatePeriodSeconds: 1
     template:
       metadata:
         labels:
           app: "${PROJECT}-${COMPONENT}"
           deploymentconfig: "${COMPONENT}"
       spec:
         serviceAccountName: "${SERVICE_ACCOUNT}"
         serviceAccount: "${SERVICE_ACCOUNT}"
         restartPolicy: Always
         terminationGracePeriodSeconds: 30
         containers:
           - name: ${COMPONENT}
             imagePullPolicy: IfNotPresent
             image: "${TAILOR_NAMESPACE}/${COMPONENT}:${TAGVERSION}"
             ports:
               - containerPort: 8080
                 protocol: TCP
             env:
               - name: PURPOSE_LOG_PATH
                 value: /app/logs/purpose_app.log
               - name: APOLLO_CLIENT_ID
                 valueFrom:
                   secretKeyRef:
                     name: apollo-secrets
                     key: client-id
               - name: APOLLO_CLIENT_SECRET
                 valueFrom:
                   secretKeyRef:
                     name: apollo-secrets
                     key: client-secret
               - name: APOLLO_TOKEN_URL
                 value: "https://api-gw.boehringer-ingelheim.com/api/oauth/token"
               - name: APOLLO_BASE_URL
                 value: "https://api-gw.boehringer-ingelheim.com/apollo"
               - name: APOLLO_MODEL
                 value: "gpt-5-mini"
               - name: APOLLO_TIMEOUT
                 value: "120"
             livenessProbe:
               httpGet:
                 path: /healthz
                 port: 8080
               initialDelaySeconds: 180
               periodSeconds: 20
               timeoutSeconds: 2
               failureThreshold: 6
             resources:
               limits:
                 cpu: "${CPU_LIMIT}"
                 memory: "${MEMORY_LIMIT}"
               requests:
                 cpu: "${CPU_REQUEST}"
                 memory: "${MEMORY_REQUEST}"
             terminationMessagePath: /dev/termination-log
             terminationMessagePolicy: File
     triggers:
       - type: ConfigChange
       - imageChangeParams:
           automatic: true
           containerNames:
             - ${COMPONENT}
           from:
             kind: ImageStreamTag
             name: ${COMPONENT}:${TAGVERSION}
             namespace: ${TAILOR_NAMESPACE}
         type: ImageChange





